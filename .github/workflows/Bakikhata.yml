name: বাকি খাতা

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. কোড চেকআউট (অ্যাকশন v4 ব্যবহার করা হয়েছে যা লেটেস্ট)
      - name: Checkout code
        uses: actions/checkout@v4

      # ২. জাভা সেটআপ (জাভা ১৭ এবং অ্যাকশন v4)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ৩. ফ্লাটার সেটআপ (লেটেস্ট ভার্সন ব্যবহার করা হয়েছে)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # আপনি চাইলে নির্দিষ্ট ভার্সন দিতে পারেন, যেমন: flutter-version: '3.19.0'

      # ৪. ডিপেন্ডেন্সি ইন্সটল করা
      - name: Install dependencies
        run: flutter pub get

      # ৫. APK বিল্ড করা (আইকন শেকিং এরর এড়াতে --no-tree-shake-icons যোগ করা হয়েছে)
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # ৬. বিল্ড করা ফাইলটি আপলোড করা যাতে আপনি ডাউনলোড করতে পারেন
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bakikhata-apk
          path: build/app/outputs/flutter-apk/app-release.apk
