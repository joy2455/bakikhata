name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        # সরাসরি রুট ডিরেক্টরিতে কাজ করার জন্য '.' ব্যবহার করা হয়েছে
        run: flutter pub get
        working-directory: .

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
        working-directory: .

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bakikhata-apk
          path: build/app/outputs/flutter-apk/app-release.apk
